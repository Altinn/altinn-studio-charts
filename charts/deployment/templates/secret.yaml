apiVersion: v1
kind: Secret
metadata:
  name: {{ template "fullname" . }}-secrets
  annotations:
    "helm.sh/resource-policy": keep
  labels:
    app: {{ template "fullname" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
type: Opaque
immutable: false
